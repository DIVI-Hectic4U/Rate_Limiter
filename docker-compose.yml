
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Algorithm selection: fixed_window | token_bucket | leaky_bucket
      #   sliding_window_log | sliding_window_counter | redis_fixed_window
      - ALGORITHM=redis_fixed_window
      - REDIS_URI=tcp://redis:6379
      - MAX_REQUESTS=5
      - WINDOW_SECONDS=60
    depends_on:
      - redis
